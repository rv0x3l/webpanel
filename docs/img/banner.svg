<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="WebPanel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#f38020" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f38020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#f38020"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f38020" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f38020"/>
      <stop offset="1" stop-color="#f38020" stop-opacity="0"/>
    </linearGradient>
    <style>
      .h { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif; font-weight: 700; letter-spacing: -0.03em; }
      .t { font-family: 'Inter', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif; font-weight: 500; letter-spacing: -0.01em; }
      .m { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 500; }
    </style>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <!-- top grid lines -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0"   y1="40"  x2="1200" y2="40"/>
    <line x1="0"   y1="80"  x2="1200" y2="80"/>
    <line x1="0"   y1="280" x2="1200" y2="280"/>
    <line x1="0"   y1="320" x2="1200" y2="320"/>
  </g>

  <!-- logo "dot" -->
  <g transform="translate(72,120)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#logo)"/>
    <rect x="0" y="0" width="64" height="64" rx="16" fill="none" stroke="#27272a" stroke-width="1"/>
  </g>

  <!-- title -->
  <text class="h" x="160" y="172" font-size="72" fill="#ededed">WebPanel</text>
  <text class="t" x="162" y="212" font-size="22" fill="#a1a1aa">
    Современная панель управления сервером — статистика, терминал, VNC, Docker, systemd
  </text>

  <!-- accent line -->
  <rect x="160" y="232" width="420" height="2" fill="url(#line)"/>

  <!-- right-side terminal mockup -->
  <g transform="translate(740,80)">
    <rect width="400" height="220" rx="12" fill="#0a0a0a" stroke="#27272a"/>
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#f5a524"/>
    <circle cx="60" cy="20" r="6" fill="#10b981"/>
    <text class="m" x="20" y="68"  font-size="13" fill="#a1a1aa">$ systemctl status nginx</text>
    <text class="m" x="20" y="92"  font-size="13" fill="#10b981">● active (running)</text>
    <text class="m" x="20" y="124" font-size="13" fill="#a1a1aa">$ docker ps</text>
    <text class="m" x="20" y="148" font-size="13" fill="#ededed">CONTAINER  IMAGE     STATUS</text>
    <text class="m" x="20" y="168" font-size="13" fill="#ededed">a3f1c8d2   postgres  Up 4 days</text>
    <text class="m" x="20" y="188" font-size="13" fill="#ededed">b7e90a4f   redis     Up 2 weeks</text>
    <text class="m" x="20" y="208" font-size="13" fill="#f38020">$ _</text>
  </g>

  <!-- bottom stat chips -->
  <g transform="translate(160,260)" class="m" font-size="13" fill="#a1a1aa">
    <rect x="0"   y="0" width="120" height="36" rx="8" fill="#111" stroke="#27272a"/>
    <text x="14" y="22">CPU 12%</text>
    <rect x="132" y="0" width="120" height="36" rx="8" fill="#111" stroke="#27272a"/>
    <text x="146" y="22">RAM 42%</text>
    <rect x="264" y="0" width="120" height="36" rx="8" fill="#111" stroke="#27272a"/>
    <text x="278" y="22">DISK 31%</text>
    <rect x="396" y="0" width="160" height="36" rx="8" fill="#111" stroke="#27272a"/>
    <text x="410" y="22" fill="#f38020">114 services</text>
  </g>
</svg>
